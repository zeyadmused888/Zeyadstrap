name: Bug Report
description: Report a problem you're having
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Zeyadstrap isn't actively maintained anymore. We might not get to your report unless it may be important (like if it's about a feature breaking). Sorry about that.
        > If your problem keeps happening, it can typically be fixed by [reinstalling](https://github.com/zeyadmused888/Zeyadstrap/releases/latest).
        ### **Instructions**
        - Before you open this report, please check the repository first: https://github.com/zeyadmused888/Zeyadstrap. Most common problems will be addressed there.
        - Also, don't open a report if it's in the [currently known issues](https://github.com/zeyadmused888/Zeyadstrap/issues). Common problems will be mentioned here too.
        - Make sure you are using the [latest version of Zeyadstrap](https://github.com/zeyadmused888/Zeyadstrap/releases/latest). Your report won't be valid if you aren't.
        - If you're finding that some feature is missing, it's probably because of a recent update. Check the [latest version's release notes](https://github.com/zeyadmused888/Zeyadstrap/releases/latest).
        - Your report will be closed if it's lazily made and has too little detail.
  - type: checkboxes
    id: terms
    attributes:
      label: I have...
      options:
        - label: I have read the instructions, and I didn't find a solution in any of the links above.
          required: true
        - label: I am using the latest version of Zeyadstrap.
          required: true
  - type: input
    id: version
    attributes:
      label: Zeyadstrap Version
      description: "What version of Zeyadstrap are you using? Find it in the 'About' section of the Settings"
      placeholder: "v1.0.0 (for example)"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What problem did you encounter?
      description: Provide a good description of the problem you're having. Screenshots too please.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: How do you reproduce the problem?
      description: Write down steps to cause the problem, from start to finish, if you can.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
  - type: textarea
    id: log
    attributes:
      label: Zeyadstrap Log
      description: If you're getting a 'Zeyadstrap Exception' error, upload your log file here. Open it, then select all (Ctrl+A), then copy and paste here. Otherwise, leave it empty.
      value: "N/A"
      render: text
